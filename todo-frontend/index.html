<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doto — Get things done</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- =====================================================
       AUTH PAGE
  ====================================================== -->
  <div class="page active" id="page-auth">

    <!-- Left decorative panel -->
    <div class="auth-panel">
      <div class="panel-content">
        <div class="panel-logo">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="3" y="3" width="26" height="26" rx="7" stroke="currentColor" stroke-width="2"/>
            <polyline points="9,16 14,21 23,11" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>doto.</span>
        </div>
        <h2 class="panel-headline">Focus on what<br/><em>truly matters.</em></h2>
        <p class="panel-sub">A minimal task manager built for people who get things done.</p>
        <div class="panel-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="panel-bg-circle c1"></div>
      <div class="panel-bg-circle c2"></div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-wrapper">

        <div class="auth-brand">
          <h1>Welcome back</h1>
          <p>Sign in to continue to your workspace</p>
        </div>

        <div class="auth-card">
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab"        id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
          </div>

          <!-- Login Form -->
          <div class="form visible" id="form-login">
            <div class="field">
              <label>Email address</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 16 16" fill="none">
                  <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <polyline points="1,5 8,10 15,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="email" id="login-email" placeholder="you@example.com"
                  onkeydown="if(event.key==='Enter') login()"/>
              </div>
            </div>
            <div class="field">
              <label>Password</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 16 16" fill="none">
                  <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="password" id="login-pass" placeholder="Your password"
                  onkeydown="if(event.key==='Enter') login()"/>
              </div>
            </div>
            <button class="btn-main" id="btn-login" onclick="login()">
              <span>Sign In</span>
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="auth-error" id="login-err"></div>
          </div>

          <!-- Signup Form -->
          <div class="form" id="form-signup">
            <div class="field">
              <label>Full Name</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M2 14c0-3 2.5-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="text" id="signup-name" placeholder="Your name"
                  onkeydown="if(event.key==='Enter') signup()"/>
              </div>
            </div>
            <div class="field">
              <label>Email address</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 16 16" fill="none">
                  <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                  <polyline points="1,5 8,10 15,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="email" id="signup-email" placeholder="you@example.com"
                  onkeydown="if(event.key==='Enter') signup()"/>
              </div>
            </div>
            <div class="field">
              <label>Password</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 16 16" fill="none">
                  <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M5 7V5a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <input type="password" id="signup-pass" placeholder="Minimum 6 characters"
                  onkeydown="if(event.key==='Enter') signup()"/>
              </div>
            </div>
            <button class="btn-main" id="btn-signup" onclick="signup()">
              <span>Create Account</span>
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="auth-error" id="signup-err"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- =====================================================
       APP PAGE
  ====================================================== -->
  <div class="page" id="page-app">
    <div class="app-shell">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-inner">

          <!-- Logo -->
          <div class="sidebar-logo">
            <div class="logo-icon">
              <svg viewBox="0 0 32 32" fill="none">
                <rect x="3" y="3" width="26" height="26" rx="7" stroke="currentColor" stroke-width="2.2"/>
                <polyline points="9,16 14,21 23,11" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>doto.</span>
          </div>

          <!-- User Card -->
          <div class="sidebar-user">
            <div class="user-avatar" id="user-avatar">U</div>
            <div class="user-info">
              <div class="user-name"  id="user-name-text">User</div>
              <div class="user-email" id="user-email-text">user@email.com</div>
            </div>
          </div>

          <!-- Progress -->
          <div class="sidebar-progress">
            <div class="progress-header">
              <span>Today's Progress</span>
              <span id="progress-pct">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <!-- Stats -->
          <div class="sidebar-stats">
            <div class="sstat">
              <span class="sstat-num" id="stat-total">0</span>
              <span class="sstat-label">Total</span>
            </div>
            <div class="sstat">
              <span class="sstat-num accent" id="stat-left">0</span>
              <span class="sstat-label">Active</span>
            </div>
            <div class="sstat">
              <span class="sstat-num success" id="stat-done">0</span>
              <span class="sstat-label">Done</span>
            </div>
          </div>

          <!-- Nav -->
          <nav class="sidebar-nav">
            <p class="nav-label">Views</p>
            <button class="nav-item active" onclick="setFilter('all',this)">
              <svg viewBox="0 0 16 16" fill="none">
                <rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/>
                <rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/>
                <rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/>
                <rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/>
              </svg>
              All Tasks
            </button>
            <button class="nav-item" onclick="setFilter('active',this)">
              <svg viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
              </svg>
              Active
            </button>
            <button class="nav-item" onclick="setFilter('done',this)">
              <svg viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6"/>
                <polyline points="5,8 7,10.5 11,5.5" stroke="currentColor" stroke-width="1.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Completed
            </button>
          </nav>

          <div class="sidebar-bottom">
            <button class="btn-logout" onclick="logout()">
              <svg viewBox="0 0 16 16" fill="none">
                <path d="M6 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h3" stroke="currentColor"
                  stroke-width="1.6" stroke-linecap="round"/>
                <path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Sign Out
            </button>
          </div>

        </div>
      </aside>

      <!-- MAIN -->
      <main class="main-content">

        <div class="main-header">
          <div class="main-header-left">
            <h2 class="main-title" id="main-title">All Tasks</h2>
            <p class="main-sub" id="main-sub">0 tasks</p>
          </div>
          <div class="main-header-right">
            <div class="header-date" id="header-date"></div>
          </div>
        </div>

        <!-- Add bar -->
        <div class="add-bar">
          <div class="add-input-wrap">
            <svg class="add-icon" viewBox="0 0 16 16" fill="none">
              <line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input class="add-input" id="new-todo-input"
              placeholder="What needs to be done? Press Enter to add..."
              onkeydown="if(event.key==='Enter') addTodo()"/>
          </div>
          <button class="btn-add" onclick="addTodo()">Add Task</button>
        </div>

        <!-- Todo list -->
        <div class="todo-list" id="todo-list">
          <div class="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Date display
    const dateEl = document.getElementById('header-date');
    if(dateEl) {
      const now = new Date();
      dateEl.textContent = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    }

    // Progress bar update — render ke baad call hogi
    const _render = window.render;
    if(typeof _render === 'function') {
      window.render = function() {
        _render();
        updateProgress();
      }
    }

    function updateProgress() {
      const total = parseInt(document.getElementById('stat-total').textContent) || 0;
      const done  = parseInt(document.getElementById('stat-done').textContent)  || 0;
      const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
      const fill  = document.getElementById('progress-fill');
      const pctEl = document.getElementById('progress-pct');
      if(fill)  fill.style.width  = pct + '%';
      if(pctEl) pctEl.textContent = pct + '%';
    }
  </script>
</body>
</html>
